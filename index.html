<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuros Valles Del Tuy - Registro</title>
    <style>
        :root {
            --logo-pink: #ff1493; /* El rosa de tu logo */
            --bg-dark: #1e1e1e;
            --text-dark: #333;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .card { 
            background: white; 
            color: var(--text-dark); 
            padding: 25px; 
            border-radius: 20px; 
            max-width: 450px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        img { 
            max-width: 220px; 
            height: auto; 
            display: block;
            margin: 0 auto 20px auto;
        }
        h2 { 
            text-align: center; 
            color: var(--logo-pink);
            margin-bottom: 10px;
            font-size: 1.4rem;
        }
        p.subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #444;
        }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--logo-pink);
            box-shadow: 0 0 5px rgba(255, 20, 147, 0.2);
        }
        .row {
            display: flex;
            gap: 10px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--logo-pink); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 1.1rem;
            cursor: pointer; 
            margin-top: 25px;
            transition: 0.3s;
        }
        button:hover {
            background: #d6117d;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.jpg" alt="Futuros Valles del Tuy">
        
        <h2>Censo de Membresía</h2>
        <p class="subtitle">Por favor, complete su información personal.</p>

        <form id="formCenso">
            <label>Nombre y Apellido</label>
            <input type="text" placeholder="Ej: Juan Pérez" required>

            <div class="row">
                <div style="flex: 2;">
                    <label>Cédula</label>
                    <input type="text" placeholder="V-12345678" required>
                </div>
                <div style="flex: 1;">
                    <label>Edad</label>
                    <input type="number" min="0" required>
                </div>
            </div>

            <div class="row">
                <div style="flex: 1;">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" required>
                </div>
                <div style="flex: 1;">
                    <label>Teléfono</label>
                    <input type="tel" placeholder="0412-0000000" required>
                </div>
            </div>

            <label>Dirección de Habitación</label>
            <textarea placeholder="Sector, calle, casa..." rows="2" required></textarea>

            <label>¿Cuántos hijos tiene?</label>
            <input type="number" value="0" min="0">

            <button type="submit">Enviar Registro</button>
        </form>

        <div class="footer">
            © 2026 Futuros Valles del Tuy
        </div>
    </div>

    <script>
        document.getElementById('formCenso').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('¡Gracias! Información recibida correctamente.');
        });
    </script>
</body>
</html>
